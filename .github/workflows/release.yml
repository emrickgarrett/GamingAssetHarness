name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract and validate version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must follow semver format: vX.Y.Z (e.g. v1.2.0)"
            exit 1
          fi

  build-windows:
    needs: validate-tag
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Build MSI installer
        run: ./gradlew :gui:packageMsi -PappVersion=${{ needs.validate-tag.outputs.version }}

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd gui/build/compose/binaries/main/msi
          sha256sum *.msi > SHA256SUMS-windows.txt

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: |
            gui/build/compose/binaries/main/msi/*.msi
            gui/build/compose/binaries/main/msi/SHA256SUMS-windows.txt

  build-linux:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Build DEB package
        run: ./gradlew :gui:packageDeb -PappVersion=${{ needs.validate-tag.outputs.version }}

      - name: Generate SHA256 checksum
        run: |
          cd gui/build/compose/binaries/main/deb
          sha256sum *.deb > SHA256SUMS-linux.txt

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-installer
          path: |
            gui/build/compose/binaries/main/deb/*.deb
            gui/build/compose/binaries/main/deb/SHA256SUMS-linux.txt

  create-release:
    needs: [validate-tag, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: v${{ needs.validate-tag.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            msi-installer/*.msi
            msi-installer/SHA256SUMS-windows.txt
            deb-installer/*.deb
            deb-installer/SHA256SUMS-linux.txt
